<html lang="ar" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ابليك فاير جلاس</title>
  <script src="./css/tailwindcss.js"></script>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
  />
  <link href="https://fonts.googleapis.com/css2?family=Almarai&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: "Almarai", sans-serif;
    }
  </style>
</head>
<body class="bg-white text-gray-800">
  <div class="max-w-7xl mx-auto px-4 py-6" dir="ltr">
    <!-- Breadcrumb -->
    <nav class="text-xs text-gray-500 mb-4 select-none">
      <ul class="flex space-x-1 items-center justify-start">
        <li>
          <a class="hover:underline" href="#">الرئيسية</a>
        </li>
        <li>/</li>
        <li>
          <a class="hover:underline" href="#">الإضاءة</a>
        </li>
        <li>/</li>
        <li>
          <a class="hover:underline" href="#">اضاءة حائط</a>
        </li>
        <li>/</li>
        <li>
          <a class="hover:underline font-semibold text-gray-900" href="#">ابليك فاير جلاس</a>
        </li>
      </ul>
    </nav>
    <div class="flex flex-col md:flex-row md:space-x-8">
      <!-- Left side -->
      <div class="flex flex-col space-y-4 md:w-1/3">
        <!-- Image small -->
        <div class="w-50 h-50 rounded-lg border border-gray-300 overflow-hidden cursor-pointer">
          <img
            alt="شعار أسود بخلفية سوداء مع نص أبيض"
            class="w-full h-full object-contain"
            height="120"
            src="./imgs/images.jpg"
            width="120"
          />
        </div>
        <!-- Price and buttons -->
        <div>
          <h2 class="text-xl font-bold mb-1">ابليك فاير جلاس</h2>
          <p class="text-xs text-gray-600 mb-3">
            <span>البائع:</span>
            <span class="font-light">Elecadi</span>
          </p>
          <div class="flex items-center space-x-4 mb-4">
            <div class="text-2xl font-bold text-gray-900">1.250,00 EGP</div>
            <div class="text-sm text-gray-400 line-through">1.565,00 EGP</div>
          </div>
          <div class="flex items-center space-x-2">
            <button
              class="bg-yellow-600 text-black text-xs font-semibold px-4 py-2 rounded hover:bg-yellow-700 flex items-center space-x-1"
              type="button"
            >
              <span>إضافة إلى العربة</span>
              <i class="fas fa-shopping-cart"></i>
            </button>
            <button
              class="bg-gray-800 text-yellow-400 text-xs font-semibold px-4 py-2 rounded hover:bg-gray-900 flex items-center space-x-1"
              type="button"
            >
              <span>تقديم عرض سعر</span>
              <i class="fas fa-pen"></i>
            </button>
            <div class="flex items-center border border-gray-300 rounded overflow-hidden h-9">
              <button
                aria-label="Decrease quantity"
                class="px-3 text-lg font-semibold text-gray-700 hover:bg-gray-100"
                type="button"
              >
                -
              </button>
              <input
                class="w-10 text-center text-sm font-semibold text-gray-900 border-x border-gray-300 focus:outline-none"
                readonly
                type="text"
                value="1"
              />
              <button
                aria-label="Increase quantity"
                class="px-3 text-lg font-semibold text-gray-700 hover:bg-gray-100"
                type="button"
              >
                +
              </button>
            </div>
          </div>
        </div>
        <!-- Add to compare and favorite -->
        <div
          class="flex items-center space-x-4 text-xs text-gray-600 border-t border-b border-gray-200 py-2 select-none"
        >
          <button class="flex items-center space-x-1 hover:text-gray-900" type="button">
            <i class="fas fa-random"></i>
            <span>إضافة إلى المقارنة</span>
          </button>
          <button class="flex items-center space-x-1 hover:text-gray-900" type="button">
            <i class="far fa-heart"></i>
            <span>إضافة إلى المفضلة</span>
          </button>
        </div>
        <!-- Accordion -->
        <div class="border-b border-gray-200">
          <button
            aria-controls="shipping-content"
            aria-expanded="false"
            class="w-full flex justify-between items-center py-2 text-sm font-semibold text-gray-700 hover:text-gray-900 focus:outline-none"
            type="button"
          >
            <span>الشحن والإرجاع</span>
            <i class="fas fa-chevron-down"></i>
          </button>
        </div>
        <div class="border-b border-gray-200">
          <button
            aria-controls="care-content"
            aria-expanded="false"
            class="w-full flex justify-between items-center py-2 text-sm font-semibold text-gray-700 hover:text-gray-900 focus:outline-none"
            type="button"
          >
            <span>العناية بالمنتج</span>
            <i class="fas fa-chevron-down"></i>
          </button>
        </div>
      </div>
      <!-- Right side images -->
      <div class="flex-1 flex flex-col md:flex-row md:space-x-4 mt-6 md:mt-0">
        <!-- Main big image -->
        <div class="relative rounded-lg overflow-hidden md:flex-1 max-w-full md:max-w-none">
          <img
            alt="ابليك فاير جلاس مثبت على جدار خشن مع ضوء الشمس وظلال"
            class="w-full h-auto object-cover rounded-lg"
            height="250"
            src="./imgs/images.jpg"
            width="300"
          />
          <div
            class="absolute top-3 left-3 bg-red-600 text-white text-xs font-semibold rounded px-2 py-0.5 select-none"
          >
            -20%
          </div>
        </div>
        <!-- Thumbnails -->
        <div class="flex flex-col space-y-3 mt-4 md:mt-0">
          <div
            class="w-20 h-20 rounded-lg border border-yellow-400 overflow-hidden cursor-pointer"
          >
            <img
              alt="صورة مصغرة لإضاءة الحائط مع إطار أصفر"
              class="w-full h-full object-cover"
              height="80"
              src="https://storage.googleapis.com/a1aa/image/b0c8aec4-9f91-4863-a377-43b920f609de.jpg"
              width="80"
            />
          </div>
          <div
            class="w-20 h-20 rounded-lg border border-gray-300 overflow-hidden cursor-pointer"
          >
            <img
              alt="صورة مصغرة لإضاءة الحائط مع إطار رمادي"
              class="w-full h-full object-cover"
              height="80"
              src="https://storage.googleapis.com/a1aa/image/e0b4640d-5d43-4798-3f6e-b40243dcf2d9.jpg"
              width="80"
            />
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
